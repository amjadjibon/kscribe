replicaCount: 1 # CON-006: single replica — Deduper and SQLite are per-process.

image:
  repository: ghcr.io/amjadjibon/kscribe
  pullPolicy: IfNotPresent
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

rbac:
  # Creates the cluster-scoped Role + binding the operator needs to watch
  # events/pods/nodes and own its CRDs.
  create: true

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""
  # Use an existing PVC instead of creating one.
  existingClaim: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  fsGroup: 65532 # lets the non-root user write the PVC at /data

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault
  # readOnlyRootFilesystem omitted: the operator writes to /tmp (Go runtime, templ).

leaderElect: false
redactEnabled: true # SEC-001: redaction is always enforced; this is audit metadata.

# How long incidents, diagnoses, chat history, and finished KscribeDiagnosis
# CRs are kept before pruning (Go duration). "0" disables pruning.
retentionPeriod: 720h

metrics:
  # Serve Prometheus metrics (controller-runtime + kscribe_* collectors).
  enabled: true
  port: 9090

# Max LLM diagnosis starts per hour across the operator (cost guard for
# event storms). 0 = unlimited; over-limit diagnoses stay Pending and retry.
maxDiagnosesPerHour: 30

# Max pods log-enriched per Deployment/ReplicaSet diagnosis (context/cost bound).
maxPodsPerWorkload: 3

notifications:
  # Email RCA results via Resend when a diagnosis finishes. Enabled only when
  # an API key (inline or existingSecret) AND at least one recipient are set.
  # "from" must use a domain verified in your Resend account or sends fail
  # (visible in logs and kscribe_notifications_total{status="failed"}).
  resend:
    apiKey: ""
    existingSecret: ""
    existingSecretKey: resend-api-key
  from: kscribe@notifications.local
  to: []
  # Slack incoming webhook (the URL is a credential; a Secret is created,
  # or point at an existing one). Composes with email when both are set.
  slack:
    webhookUrl: ""
    existingSecret: ""
    existingSecretKey: slack-webhook-url

dashboard:
  # Static bearer token protecting the dashboard (empty = auth disabled).
  # Provide inline (a Secret is created) OR point at an existing Secret.
  token: ""
  existingSecret: ""
  existingSecretKey: dashboard-token

llm:
  # provider "openai" (default) or "google"/"gemini". google auto-targets Gemini's
  # OpenAI-compatible endpoint; any OpenAI-compatible API works via baseURL.
  provider: openai
  model: gpt-4o-mini
  # Override the API base (incl. version segment). Empty = provider default.
  # e.g. https://generativelanguage.googleapis.com/v1beta/openai for Gemini.
  baseURL: ""
  # Provide the API key inline (a Secret is created) OR point at an existing Secret.
  apiKey: ""
  existingSecret: ""
  existingSecretKey: api-key

# Default DiagnosisPolicy installed in the release namespace.
defaultPolicy:
  enabled: true
  eventReasons:
    - BackOff
    - OOMKilling
    - Failed
    - FailedScheduling
    - Unhealthy
    - FailedMount
    - FailedAttachVolume
    - FailedCreate
    - FailedCreatePodSandBox
    - Evicted
    - BackoffLimitExceeded
  maxIterations: 5
  redact: true

nodeSelector: {}
tolerations: []
affinity: {}
