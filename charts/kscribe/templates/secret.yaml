{{- if not .Values.llm.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kscribe.llmSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Empty by default — the operator boots without it and only needs it to call
  # the LLM. Set llm.apiKey, or point llm.existingSecret at your own Secret.
  api-key: {{ .Values.llm.apiKey | quote }}
{{- end }}
{{- if and .Values.dashboard.token (not .Values.dashboard.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kscribe.dashboardSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
type: Opaque
stringData:
  dashboard-token: {{ .Values.dashboard.token | quote }}
{{- end }}
{{- if and .Values.notifications.resend.apiKey (not .Values.notifications.resend.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kscribe.resendSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
type: Opaque
stringData:
  resend-api-key: {{ .Values.notifications.resend.apiKey | quote }}
{{- end }}
