{{- if not .Values.llm.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kscribe.llmSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Empty by default — the operator boots without it and only needs it to call
  # the LLM. Set llm.apiKey, or point llm.existingSecret at your own Secret.
  api-key: {{ .Values.llm.apiKey | quote }}
{{- end }}
