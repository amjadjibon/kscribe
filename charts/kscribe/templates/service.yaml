apiVersion: v1
kind: Service
metadata:
  name: {{ include "kscribe.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kscribe.selectorLabels" . | nindent 4 }}
  ports:
  - name: http
    port: {{ .Values.service.port }}
    targetPort: http
