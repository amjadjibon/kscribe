{{- if .Values.rbac.create -}}
# The ClusterRole "kscribe-role" is generated from Go //+kubebuilder:rbac markers
# by `make manifests` into templates/role.yaml. This binds it to the operator's SA.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kscribe.fullname" . }}
  labels:
    {{- include "kscribe.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kscribe-role
subjects:
- kind: ServiceAccount
  name: {{ include "kscribe.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
