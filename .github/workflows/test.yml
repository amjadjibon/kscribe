name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  minikube:
    name: build image and deploy in minikube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@latest

      - name: Build image into minikube
        run: |
          eval "$(minikube docker-env)"
          docker build -t ghcr.io/amjadjibon/kscribe:latest .

      # The Deployment references a Secret for the LLM API key; create it (and the
      # namespace) before applying so the manager pod can start. A dummy value is
      # fine — this smoke test only checks the operator boots and serves /healthz.
      - name: Create namespace and dummy LLM secret
        run: |
          kubectl create namespace kscribe-system
          kubectl create secret generic kscribe-llm-secret \
            --namespace kscribe-system \
            --from-literal=api-key=ci-dummy-key

      - name: Apply manifests
        run: |
          # First apply creates the CRDs; the bundled DiagnosisPolicy CR may race
          # ahead of CRD establishment, so wait then apply again (idempotent).
          kubectl apply -f deploy/kscribe.yaml || true
          kubectl wait --for=condition=established --timeout=60s \
            crd/diagnosispolicies.kscribe.amjadjibon.dev \
            crd/kscribediagnoses.kscribe.amjadjibon.dev
          kubectl apply -f deploy/kscribe.yaml

      - name: Use the locally built image
        run: |
          # Image is loaded in minikube's daemon; IfNotPresent stops a pull from GHCR.
          kubectl -n kscribe-system patch deployment kscribe-manager --type=json \
            -p '[{"op":"add","path":"/spec/template/spec/containers/0/imagePullPolicy","value":"IfNotPresent"}]'

      - name: Wait for rollout
        run: kubectl -n kscribe-system rollout status deployment/kscribe-manager --timeout=180s

      - name: Verify dashboard /healthz
        run: |
          kubectl -n kscribe-system port-forward service/kscribe-dashboard 8080:8080 &
          PF_PID=$!
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/healthz; then
              echo "healthz OK"
              kill $PF_PID
              exit 0
            fi
            sleep 2
          done
          kill $PF_PID
          echo "healthz never became ready"
          exit 1

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n kscribe-system get pods,deploy,pvc,svc -o wide || true
          kubectl -n kscribe-system describe deployment kscribe-manager || true
          kubectl -n kscribe-system logs deployment/kscribe-manager --all-containers --tail=200 || true
          kubectl get events -n kscribe-system --sort-by=.lastTimestamp || true
