# Source: kscribe/templates/diagnosispolicy.yaml
apiVersion: kscribe.amjadjibon.dev/v1alpha1
kind: DiagnosisPolicy
metadata:
  name: default
  namespace: kscribe-system
  labels:
    helm.sh/chart: kscribe-0.1.0
    app.kubernetes.io/name: kscribe
    app.kubernetes.io/instance: kscribe
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  enabled: true
  eventReasons:
    - BackOff
    - OOMKilling
    - Failed
    - FailedScheduling
  llmProvider: "openai"
  llmModel: "gpt-4o-mini"
  maxIterations: 5
  redact: true
