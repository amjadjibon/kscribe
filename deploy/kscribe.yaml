# Source: kscribe/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kscribe
  namespace: kscribe-system
  labels:
    helm.sh/chart: kscribe-0.1.0
    app.kubernetes.io/name: kscribe
    app.kubernetes.io/instance: kscribe
    app.kubernetes.io/version: "latest"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kscribe
      app.kubernetes.io/instance: kscribe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kscribe
        app.kubernetes.io/instance: kscribe
    spec:
      serviceAccountName: kscribe
      securityContext:
        fsGroup: 65532
      containers:
      - name: manager
        image: ghcr.io/amjadjibon/kscribe:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KSCRIBE_DB_PATH
          value: /data/kscribe.db
        - name: KSCRIBE_ADDR
          value: ":8080"
        - name: KSCRIBE_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KSCRIBE_LLM_PROVIDER
          value: "openai"
        - name: KSCRIBE_LLM_MODEL
          value: "gpt-4o-mini"
        - name: KSCRIBE_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: kscribe-llm
              key: api-key
              optional: true
        - name: KSCRIBE_LEADER_ELECT
          value: "false"
        - name: KSCRIBE_REDACT_ENABLED
          value: "true"
        - name: KSCRIBE_RETENTION_PERIOD
          value: "720h"
        - name: KSCRIBE_MAX_DIAGNOSES_PER_HOUR
          value: "30"
        - name: KSCRIBE_METRICS_ADDR
          value: ":8081"
        ports:
        - name: http
          containerPort: 8080
        - name: metrics
          containerPort: 8081
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: db
          mountPath: /data
      volumes:
      - name: db
        persistentVolumeClaim:
          claimName: kscribe-db
