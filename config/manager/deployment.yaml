---
# TASK-036: KSCRIBE_LLM_API_KEY is sourced from the kscribe-llm-secret Secret.
# Create it before deploying: kubectl create secret generic kscribe-llm-secret \
#   --namespace kscribe-system --from-literal=api-key=<your-openai-key>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kscribe-manager
  namespace: kscribe-system
spec:
  replicas: 1  # CON-006: single replica; Deduper and SQLite are per-process
  selector:
    matchLabels:
      app: kscribe-manager
  template:
    metadata:
      labels:
        app: kscribe-manager
    spec:
      serviceAccountName: kscribe-manager
      securityContext:
        fsGroup: 65532  # allows non-root user to write to the PVC mounted at /data
      containers:
      - name: manager
        image: ghcr.io/amjadjibon/kscribe:latest
        env:
        - name: KSCRIBE_DB_PATH
          value: /data/kscribe.db
        - name: KSCRIBE_ADDR
          value: ":8080"
        - name: KSCRIBE_OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: KSCRIBE_LLM_PROVIDER
          value: openai
        - name: KSCRIBE_LLM_MODEL
          value: gpt-4o-mini
        - name: KSCRIBE_LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: kscribe-llm-secret
              key: api-key
        - name: KSCRIBE_LEADER_ELECT
          value: "false"
        - name: KSCRIBE_REDACT_ENABLED
          value: "true"
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
          # readOnlyRootFilesystem omitted: the operator writes to /tmp (Go runtime, templ).
          # Add an emptyDir for /tmp and set readOnlyRootFilesystem: true when confirmed safe.
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: db
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: db
        persistentVolumeClaim:
          claimName: kscribe-db
